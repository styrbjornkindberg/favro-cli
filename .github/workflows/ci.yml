name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npx jest --coverage --no-verbose
        env:
          CI: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only run when secrets are available (not on forks)
    if: github.repository == github.event.repository.full_name && github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npx jest --config jest.integration.config.js --verbose
        env:
          CI: true
          FAVRO_API_TOKEN: ${{ secrets.FAVRO_API_TOKEN }}
          FAVRO_TEST_BOARD_ID: ${{ secrets.FAVRO_TEST_BOARD_ID }}
        # Integration tests require credentials — skip gracefully if not set
        continue-on-error: ${{ secrets.FAVRO_API_TOKEN == '' }}

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
